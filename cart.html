<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — 696 DEPT</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-page { padding: 40px 0 80px; }

    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
      align-items: start;
    }

    h1.cart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* ─── Cart Table ─── */
    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cart-table th {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 0 12px;
      border-bottom: 1.5px solid var(--black);
      text-align: left;
    }

    .cart-table th:nth-child(2),
    .cart-table th:nth-child(3),
    .cart-table th:nth-child(4) {
      text-align: center;
    }

    .cart-row td {
      padding: 20px 0;
      border-bottom: 1px solid var(--light-gray);
      vertical-align: middle;
    }

    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-item-img {
      width: 80px;
      height: 80px;
      background: #111;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: rgba(255,255,255,0.4);
    }

    .cart-item-img.light-bg { background: #f0f0f0; color: rgba(0,0,0,0.15); }

    .cart-item-details {}

    .cart-item-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .cart-item-meta {
      font-size: 12px;
      color: var(--mid-gray);
    }

    .cart-price, .cart-total-cell {
      text-align: center;
      font-weight: 600;
      font-size: 14px;
    }

    .cart-qty-cell { text-align: center; }

    .cart-remove {
      cursor: pointer;
      color: var(--mid-gray);
      font-size: 18px;
      line-height: 1;
      background: none;
      border: none;
      transition: color 0.2s;
      text-align: right;
    }

    .cart-remove:hover { color: var(--black); }

    /* ─── Empty Cart ─── */
    .empty-cart {
      text-align: center;
      padding: 80px 0;
    }

    .empty-cart h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .empty-cart p { font-size: 14px; color: var(--mid-gray); margin-bottom: 28px; }

    /* ─── Cart Footer Row ─── */
    .cart-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
    }

    /* ─── Order Summary ─── */
    .order-summary {
      border: 1.5px solid var(--black);
      padding: 28px;
    }

    .order-summary h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .summary-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-table th:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="container cart-page">
    <div class="breadcrumb">
      <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <span>Cart</span>
    </div>

    <h1 class="cart-title">Your Cart</h1>

    <div id="cartContent">
      <!-- Rendered by JS -->
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    function renderCart() {
      const content = document.getElementById('cartContent');

      if (Cart.items.length === 0) {
        content.innerHTML = `
          <div class="empty-cart">
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added anything yet.</p>
            <a href="shop.html" class="btn btn-primary">Shop Now</a>
          </div>
        `;
        return;
      }

      const shipping = 50;
      const subtotal = Cart.total;
      const total = subtotal + shipping;

      content.innerHTML = `
        <div class="cart-layout">
          <!-- Cart Table -->
          <div>
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Qty</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cartRows">
                ${Cart.items.map(item => `
                  <tr class="cart-row" data-key="${item.key}">
                    <td>
                      <div class="cart-item-info">
                        <div class="cart-item-img ${item.color === 'White' ? 'light-bg' : ''}">696</div>
                        <div class="cart-item-details">
                          <p class="cart-item-name">${item.name}</p>
                          <p class="cart-item-meta">Size: ${item.size}</p>
                          <p class="cart-item-meta">Color: ${item.color}</p>
                        </div>
                      </div>
                    </td>
                    <td class="cart-price">P${item.price}</td>
                    <td class="cart-qty-cell">
                      <div class="qty-control" style="margin:0 auto">
                        <button class="qty-btn qty-minus" data-key="${item.key}">&#8722;</button>
                        <span class="qty-value">${item.qty}</span>
                        <button class="qty-btn qty-plus" data-key="${item.key}">&#43;</button>
                      </div>
                    </td>
                    <td class="cart-total-cell">P${item.price * item.qty}</td>
                    <td>
                      <button class="cart-remove" data-key="${item.key}" aria-label="Remove">&times;</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>

            <div class="cart-footer">
              <a href="shop.html" class="btn btn-outline">Continue Shopping</a>
            </div>
          </div>

          <!-- Order Summary -->
          <div class="order-summary">
            <h3>Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span>P${subtotal}</span></div>
            <div class="summary-row"><span>Shipping</span><span>P${shipping}</span></div>
            <hr class="summary-divider">
            <div class="summary-total"><span>Total</span><span>P${total}</span></div>
            <a href="checkout.html" class="btn btn-primary btn-full">Checkout</a>
          </div>
        </div>
      `;

      // Remove item
      document.querySelectorAll('.cart-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          Cart.remove(btn.dataset.key);
          renderCart();
        });
      });

      // Qty +/-
      document.querySelectorAll('.qty-minus').forEach(btn => {
        btn.addEventListener('click', () => {
          Cart.updateQty(btn.dataset.key, -1);
          renderCart();
        });
      });

      document.querySelectorAll('.qty-plus').forEach(btn => {
        btn.addEventListener('click', () => {
          Cart.updateQty(btn.dataset.key, 1);
          renderCart();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
