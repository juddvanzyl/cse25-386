
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; }

/* NAV */
.navbar {
  background:#eee;
  padding:15px 40px;
}
.logo {
  border:2px solid #000;
  padding:5px 12px;
  font-weight:bold;
}
.nav-links a {
  margin:0 15px;
  text-decoration:none;
  color:#000;
}
.active-link {
  border-bottom:2px solid #000;
}

/* SIDEBAR */
.sidebar {
  border-right:1px solid #ddd;
  padding-right:20px;
}
.sidebar a {
  display:block;
  margin:8px 0;
  cursor:pointer;
}

/* PRODUCTS */
.product {
  margin-bottom:25px;
  cursor:pointer;
}
.product img {
  width:100%;
  background:#f5f5f5;
}

/* PAGINATION */
.pagination-box {
  text-align:center;
  margin-top:20px;
}
.pagination-box span {
  margin:0 10px;
  cursor:pointer;
  padding:5px 10px;
}
.pagination-box .active {
  font-weight:bold;
  border-bottom:2px solid #000;
}

/* FOOTER */
footer {
  background:#000;
  color:#fff;
  padding:30px;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar d-flex justify-content-between">
  <div class="logo">696 DEPT</div>
  <div class="nav-links">
    <a href="index.html">HOME</a>
    <a href="shop.html" class="active-link">SHOP</a>
    <a href="about.html">ABOUT</a>
    <a href="#">LOOKBOOK</a>
    <a href="contact.html">CONTACT</a>
  </div>
</div>

<div class="container mt-4">

<div>HOME / SHOP</div>

<div class="row mt-3">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar">
<h6>CATEGORIES</h6>
<a onclick="setCategory('all')">All T-Shirts</a>
<a onclick="setCategory('graphic')">Graphic Tees</a>
<a onclick="setCategory('plain')">Plain Tees</a>
</div>

<!-- PRODUCTS -->
<div class="col-md-9">

<h3>ALL T-SHIRTS</h3>

<div class="row mt-3" id="products">

<!-- PAGE 1 -->
<div class="col-md-3 product" data-page="1" data-category="plain" onclick="openProduct('p1')">
<img src="images/p1.jpg"><p>Bold 696 Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="1" data-category="plain" onclick="openProduct('p2')">
<img src="images/p2.jpg"><p>Classic 696 Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="1" data-category="graphic" onclick="openProduct('p3')">
<img src="images/p3.jpg"><p>Global Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="1" data-category="graphic" onclick="openProduct('p4')">
<img src="images/p4.jpg"><p>Splatter 696 Tee</p><b>P299</b>
</div>

<!-- PAGE 2 -->
<div class="col-md-3 product" data-page="2" data-category="graphic" onclick="openProduct('p5')">
<img src="images/p5.jpg"><p>Worldwide Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="2" data-category="graphic" onclick="openProduct('p6')">
<img src="images/p6.jpg"><p>Heritage Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="2" data-category="plain" onclick="openProduct('p7')">
<img src="images/p7.jpg"><p>Core 696 Tee</p><b>P299</b>
</div>

<div class="col-md-3 product" data-page="2" data-category="graphic" onclick="openProduct('p8')">
<img src="images/p8.jpg"><p>Back Print Tee</p><b>P299</b>
</div>

</div>
<!-- PAGINATION -->
<div class="pagination-box">
<span onclick="changePage(1)" class="active">1</span>
<span onclick="changePage(2)">2</span>
</div>

</div>
</div>
</div>

<footer>696 DEPT</footer>

<script>

let currentCategory = "all";

function changePage(page){
  document.querySelectorAll(".product").forEach(el=>{
    el.style.display = (el.dataset.page == page) ? "block" : "none";
  });

  document.querySelectorAll(".pagination-box span").forEach(btn=>{
    btn.classList.remove("active");
  });

  document.querySelector(`.pagination-box span:nth-child(${page})`).classList.add("active");
}

function setCategory(cat){
  currentCategory = cat;

  document.querySelectorAll(".product").forEach(el=>{
    let show = (cat === "all" || el.dataset.category === cat);
    el.style.display = show ? "block" : "none";
  });
}

function openProduct(id){
  localStorage.setItem("product", id);
  window.location.href = "product.html";
}

/* default page */
changePage(1);

</script>

</body>
</html>
