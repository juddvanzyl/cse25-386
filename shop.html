<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — 696 DEPT</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .shop-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 48px;
      padding: 40px 0 80px;
    }

    /* ─── Sidebar ─── */
    .shop-sidebar {}

    .sidebar-section {
      margin-bottom: 32px;
    }

    .sidebar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-links { list-style: none; }

    .sidebar-links li { margin-bottom: 10px; }

    .sidebar-links a {
      font-size: 13px;
      color: var(--mid-gray);
      transition: color 0.2s;
      display: block;
    }

    .sidebar-links a:hover,
    .sidebar-links a.active {
      color: var(--black);
      font-weight: 600;
    }

    /* Price Range */
    .price-range {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .price-input {
      width: 72px;
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }

    .price-input:focus { border-color: var(--black); }

    /* Size filter */
    .size-filter {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .size-check {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .size-check input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--black);
    }

    /* Color filter */
    .color-swatches {
      display: flex;
      gap: 10px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .color-swatch:hover,
    .color-swatch.active { border-color: var(--black); }

    /* ─── Products Area ─── */
    .shop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .shop-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sort-select {
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.05em;
      outline: none;
      cursor: pointer;
      background: var(--white);
    }

    .products-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    /* ─── Pagination ─── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 48px;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--white);
      color: var(--black);
    }

    .page-btn:hover,
    .page-btn.active {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* ─── Badge ─── */
    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--black);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      z-index: 2;
    }

    /* Tee colors */
    .tee-black { background: #111; }
    .tee-white { background: #f0f0f0; }
    .tee-grey { background: #888; }

    .tee-svg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: rgba(255,255,255,0.5);
    }

    .tee-white .tee-svg { color: rgba(0,0,0,0.12); }

    @media (max-width: 900px) {
      .shop-layout { grid-template-columns: 1fr; }
      .shop-sidebar { display: none; }
      .products-grid-3 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .products-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Home</a> / <span>Shop</span>
    </div>

    <div class="shop-layout">
      <!-- ─── SIDEBAR ─── -->
      <aside class="shop-sidebar">

        <div class="sidebar-section">
          <p class="sidebar-title">Categories</p>
          <ul class="sidebar-links" id="categoryLinks">
            <li><a href="#" class="active" data-cat="All">All T-Shirts</a></li>
            <li><a href="#" data-cat="New Arrivals">New Arrivals</a></li>
            <li><a href="#" data-cat="Best Sellers">Best Sellers</a></li>
            <li><a href="#" data-cat="Graphic Tees">Graphic Tees</a></li>
            <li><a href="#" data-cat="Plain Tees">Plain Tees</a></li>
            <li><a href="#" data-cat="Limited Edition">Limited Edition</a></li>
          </ul>
        </div>

        <div class="sidebar-section">
          <p class="sidebar-title">Filters</p>

          <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;color:var(--dark-gray)">Price</p>
          <div class="price-range">
            <input class="price-input" type="number" placeholder="P0" min="0" max="999" id="priceMin">
            <span style="color:var(--mid-gray)">–</span>
            <input class="price-input" type="number" placeholder="P500" min="0" max="999" id="priceMax">
          </div>

          <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin:18px 0 10px;color:var(--dark-gray)">Size</p>
          <div class="size-filter">
            <label class="size-check"><input type="checkbox" value="S"> S</label>
            <label class="size-check"><input type="checkbox" value="M"> M</label>
            <label class="size-check"><input type="checkbox" value="L"> L</label>
            <label class="size-check"><input type="checkbox" value="XL"> XL</label>
            <label class="size-check"><input type="checkbox" value="XXL"> XXL</label>
          </div>

          <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin:18px 0 10px;color:var(--dark-gray)">Color</p>
          <div class="color-swatches">
            <div class="color-swatch active" style="background:#111" title="Black"></div>
            <div class="color-swatch" style="background:#f5f5f5;border:1px solid #ddd" title="White"></div>
            <div class="color-swatch" style="background:#888" title="Grey"></div>
            <div class="color-swatch" style="background:#c4a882" title="Sand"></div>
          </div>
        </div>

      </aside>

      <!-- ─── PRODUCTS ─── -->
      <main>
        <div class="shop-header">
          <h1 class="shop-heading" id="shopHeading">All T-Shirts</h1>
          <select class="sort-select" id="sortSelect">
            <option value="">Sort by</option>
            <option value="name-asc">Name A–Z</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>

        <div class="products-grid-3" id="productsGrid">
          <!-- injected by JS -->
        </div>

        <div class="pagination">
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">&#8250;</button>
        </div>
      </main>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    const TEE_STYLES = [
      { cls: 'tee-black', label: '696' },
      { cls: 'tee-white', label: '696' },
      { cls: 'tee-black', label: '696' },
      { cls: 'tee-white', label: '696' },
      { cls: 'tee-white', label: '696' },
      { cls: 'tee-black', label: '696' },
      { cls: 'tee-grey',  label: '696' },
      { cls: 'tee-black', label: '696' },
    ];

    let currentCat = 'All';

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map((p, i) => {
        const style = TEE_STYLES[i % TEE_STYLES.length];
        return `
          <a href="product.html?id=${p.id}" class="product-card">
            <div class="product-card-img ${style.cls}" style="position:relative">
              ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
              <div class="tee-svg">${style.label}</div>
            </div>
            <div class="product-card-info">
              <p class="product-card-name">${p.name}</p>
              <p class="product-card-price">P${p.price}</p>
            </div>
          </a>
        `;
      }).join('');
    }

    function filterProducts() {
      let list = [...PRODUCTS];
      if (currentCat !== 'All') {
        list = list.filter(p => p.category === currentCat);
      }
      document.getElementById('shopHeading').textContent = currentCat === 'All' ? 'All T-Shirts' : currentCat;

      const sort = document.getElementById('sortSelect').value;
      if (sort === 'price-asc') list.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') list.sort((a, b) => b.price - a.price);
      if (sort === 'name-asc') list.sort((a, b) => a.name.localeCompare(b.name));

      renderProducts(list);
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Pre-select category from URL
      const params = new URLSearchParams(window.location.search);
      const urlCat = params.get('cat');
      if (urlCat) currentCat = urlCat;

      filterProducts();

      // Category links
      document.getElementById('categoryLinks').addEventListener('click', e => {
        e.preventDefault();
        const link = e.target.closest('a[data-cat]');
        if (!link) return;
        document.querySelectorAll('#categoryLinks a').forEach(a => a.classList.remove('active'));
        link.classList.add('active');
        currentCat = link.dataset.cat;
        filterProducts();
      });

      document.getElementById('sortSelect').addEventListener('change', filterProducts);

      // Color swatches toggle
      document.querySelectorAll('.color-swatch').forEach(sw => {
        sw.addEventListener('click', () => sw.classList.toggle('active'));
      });
    });
  </script>
</body>
</html>
