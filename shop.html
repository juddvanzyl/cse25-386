<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; }

/* NAV */
.navbar {
  background:#eee;
  padding:15px 40px;
}
.logo-box {
  border:2px solid #000;
  padding:5px 12px;
  font-weight:bold;
}
.nav-center a {
  margin:0 15px;
  text-decoration:none;
  color:#000;
}
.nav-link.active {
  border-bottom:2px solid #000;
}

/* SIDEBAR */
.sidebar {
  border-right:1px solid #ddd;
  padding-right:20px;
}

/* CATEGORY WITH IMAGE */
.category-card {
  margin-bottom:12px;
  cursor:pointer;
}
.category-card img {
  width:100%;
  height:80px;
  object-fit:cover;
  background:#f5f5f5;
}
.category-card p {
  margin:5px 0;
  font-size:14px;
}

/* PRODUCTS */
.product-card {
  margin-bottom:25px;
  cursor:pointer;
}
.product-card img {
  width:100%;
  background:#f5f5f5;
}

/* FILTER */
.filter-section {
  margin-top:30px;
}
.color-box {
  width:25px;
  height:25px;
  display:inline-block;
  margin-right:8px;
  border:1px solid #ccc;
  cursor:pointer;
}

/* PAGINATION */
.pagination-box {
  text-align:center;
  margin-top:20px;
}
.pagination-box span {
  margin:0 10px;
  cursor:pointer;
}
.pagination-box .active {
  font-weight:bold;
}

/* FOOTER */
footer {
  background:#000;
  color:#fff;
  padding:30px;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar d-flex justify-content-between align-items-center">
  <div class="logo-box">696 DEPT</div>
  <div class="nav-center">
    <a href="index.html">HOME</a>
    <a href="shop.html" class="nav-link active">SHOP</a>
    <a href="about.html">ABOUT</a>
    <a href="#">LOOKBOOK</a>
    <a href="contact.html">CONTACT</a>
  </div>
</div>

<div class="container mt-4">
<div class="mb-3">HOME / SHOP</div>

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar">

<h6>CATEGORIES</h6>

<!-- 🔥 CATEGORY WITH IMAGE -->
<div class="category-card" onclick="filterCategory('all')">
  <img src="images/cat-all.jpg">
  <p>All T-Shirts</p>
</div>

<div class="category-card" onclick="filterCategory('new')">
  <img src="images/cat-new.jpg">
  <p>New Arrivals</p>
</div>

<div class="category-card" onclick="filterCategory('best')">
  <img src="images/cat-best.jpg">
  <p>Best Sellers</p>
</div>

<div class="category-card" onclick="filterCategory('graphic')">
  <img src="images/cat-graphic.jpg">
  <p>Graphic Tees</p>
</div>

<div class="category-card" onclick="filterCategory('plain')">
  <img src="images/cat-plain.jpg">
  <p>Plain Tees</p>
</div>

<div class="category-card" onclick="filterCategory('limited')">
  <img src="images/cat-limited.jpg">
  <p>Limited Edition</p>
</div>

<hr>

<!-- FILTERS -->
<div class="filter-section">
<h6>Price</h6>
<input type="range" min="0" max="500" value="500" id="priceRange" oninput="filterPrice()">
<p>P0 — P<span id="priceValue">500</span></p>
</div>

<div class="filter-section">
<h6>Size</h6>
<label><input type="checkbox"> S</label><br>
<label><input type="checkbox"> M</label><br>
<label><input type="checkbox"> L</label><br>
<label><input type="checkbox"> XL</label><br>
<label><input type="checkbox"> XXL</label>
</div>

<div class="filter-section">
<h6>Color</h6>
<div class="color-box" style="background:black" onclick="setColor('black')"></div>
<div class="color-box" style="background:white" onclick="setColor('white')"></div>
<div class="color-box" style="background:gray" onclick="setColor('gray')"></div>
<div class="color-box" style="background:beige" onclick="setColor('beige')"></div>
</div>

</div>

<!-- PRODUCTS -->
<div class="col-md-9">
<h3>ALL T-SHIRTS</h3>

<div class="row mt-3">

<div class="col-md-3 product-card"><img src="images/p1.jpg"><p>Bold Tee</p><b>P299</b></div>
<div class="col-md-3 product-card"><img src="images/p2.jpg"><p>Classic Tee</p><b>P299</b></div>
<div class="col-md-3 product-card"><img src="images/p3.jpg"><p>Global Tee</p><b>P299</b></div>
<div class="col-md-3 product-card"><img src="images/p4.jpg"><p>Splatter Tee</p><b>P299</b></div>

</div>

<div class="pagination-box">
<span class="active">1</span>
<span>2</span>
<span>3</span>
</div>

</div>
</div>
</div>

<footer>696 DEPT</footer>

<script>
function filterCategory(cat){
  console.log("Filtering:", cat);
}

function filterPrice(){
  let v = document.getElementById("priceRange").value;
  document.getElementById("priceValue").innerText = v;
}

function setColor(c){
  console.log("Color:", c);
}
</script>

</body>
</html>
