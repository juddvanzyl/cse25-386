<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; }
.sidebar { border-right:1px solid #ddd; }
.product-card { cursor:pointer; margin-bottom:25px; }
.product-card img { width:100%; }
.pagination { text-align:center; margin-top:20px; cursor:pointer; }
</style>
</head>

<body>

<div class="container mt-4">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar">
<h6>CATEGORIES</h6>
<a onclick="filterCategory('all')">All</a><br>
<a onclick="filterCategory('graphic')">Graphic</a><br>
<a onclick="filterCategory('plain')">Plain</a>
</div>

<!-- PRODUCTS -->
<div class="col-md-9">

<div class="row" id="products">

<!-- PAGE 1 -->
<div class="col-md-3 product-card" data-page="1" onclick="openProduct('p1')">
<img src="images/p1.jpg"><p>Bold Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="1" onclick="openProduct('p2')">
<img src="images/p2.jpg"><p>Classic Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="1" onclick="openProduct('p3')">
<img src="images/p3.jpg"><p>Global Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="1" onclick="openProduct('p4')">
<img src="images/p4.jpg"><p>Splatter Tee</p><b>P299</b>
</div>

<!-- PAGE 2 -->
<div class="col-md-3 product-card" data-page="2" onclick="openProduct('p5')">
<img src="images/p5.jpg"><p>Worldwide Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="2" onclick="openProduct('p6')">
<img src="images/p6.jpg"><p>Heritage Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="2" onclick="openProduct('p7')">
<img src="images/p7.jpg"><p>Core Tee</p><b>P299</b>
</div>

<div class="col-md-3 product-card" data-page="2" onclick="openProduct('p8')">
<img src="images/p8.jpg"><p>Back Print</p><b>P299</b>
</div>

</div>

<!-- PAGINATION -->
<div class="pagination">
<span onclick="changePage(1)">1</span>
<span onclick="changePage(2)">2</span>
<span onclick="changePage(3)">3</span>
</div>

</div>
</div>
</div>

<script>

// pagination
function changePage(page){
  document.querySelectorAll(".product-card").forEach(p=>{
    p.style.display = (p.dataset.page == page) ? "block" : "none";
  });
}

// product click
function openProduct(id){
  localStorage.setItem("product", id);
  window.location.href = "product.html";
}

// start page
changePage(1);

</script>

</body>
</html>
