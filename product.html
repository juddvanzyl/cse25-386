<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 text-center">

<img id="productImg" width="300">
<h3 id="productName"></h3>
<h4>P299</h4>

<button onclick="addToCart()" class="btn btn-dark">Add to Cart</button>

</div>

<script>

let id = localStorage.getItem("product");

document.getElementById("productImg").src = "images/" + id + ".jpg";
document.getElementById("productName").innerText = id.toUpperCase();

function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(id);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

</script>

</body>
</html>
