<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — 696 DEPT</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-page { padding: 40px 0 80px; }

    .checkout-heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 48px;
      align-items: start;
    }

    /* ─── Accordion Sections ─── */
    .checkout-section {
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
      background: var(--off-white);
    }

    .section-header h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .section-header .chevron {
      font-size: 16px;
      transition: transform 0.3s;
      color: var(--mid-gray);
    }

    .section-header.open .chevron { transform: rotate(180deg); }

    .section-body {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: block;
    }

    .section-body.collapsed { display: none; }

    /* Shipping form open by default */
    #section1 .section-body { display: block; }
    #section1 .section-header { background: var(--white); }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Shipping Methods */
    .shipping-options { display: flex; flex-direction: column; gap: 12px; }

    .shipping-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .shipping-option:has(input:checked) { border-color: var(--black); }

    .shipping-option-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .shipping-option input[type="radio"] { accent-color: var(--black); }

    .shipping-option-name { font-size: 13px; font-weight: 600; }
    .shipping-option-sub { font-size: 11px; color: var(--mid-gray); }
    .shipping-option-price { font-weight: 700; font-size: 14px; }

    /* Payment */
    .payment-methods { display: flex; flex-direction: column; gap: 10px; }

    .payment-method {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
    }

    .payment-method:has(input:checked) { border-color: var(--black); }

    .payment-method input[type="radio"] { accent-color: var(--black); }
    .payment-method span { font-size: 13px; font-weight: 500; }

    /* ─── Order Summary ─── */
    .order-summary {
      border: 1.5px solid var(--black);
      padding: 28px;
      position: sticky;
      top: 80px;
    }

    .order-summary h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .order-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--light-gray);
    }

    .order-item-img {
      width: 52px;
      height: 52px;
      background: #111;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 900;
      color: rgba(255,255,255,0.4);
    }

    .order-item-name { font-size: 13px; font-weight: 600; }
    .order-item-meta { font-size: 11px; color: var(--mid-gray); }

    .order-item-price {
      margin-left: auto;
      font-weight: 700;
      font-size: 13px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .form-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="container checkout-page">
    <div class="breadcrumb">
      <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <a href="cart.html">Cart</a> / <span>Checkout</span>
    </div>

    <h1 class="checkout-heading">Checkout</h1>

    <div class="checkout-layout">

      <!-- ─── LEFT: FORMS ─── -->
      <div>

        <!-- Section 1: Shipping Info -->
        <div class="checkout-section" id="section1">
          <div class="section-header open" onclick="toggleSection(this)">
            <h3>1. Shipping Information</h3>
            <span class="chevron">&#8964;</span>
          </div>
          <div class="section-body">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input class="form-control" type="text" placeholder="Enter your full name" id="fullName">
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input class="form-control" type="email" placeholder="Enter your email" id="email">
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input class="form-control" type="tel" placeholder="Enter your phone number" id="phone">
            </div>
            <div class="form-group">
              <label class="form-label">Address</label>
              <input class="form-control" type="text" placeholder="Enter your address" id="address">
            </div>
            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label">City</label>
                <input class="form-control" type="text" placeholder="Enter your city" id="city">
              </div>
              <div class="form-group">
                <label class="form-label">Postal Code</label>
                <input class="form-control" type="text" placeholder="Enter postal code" id="postalCode">
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: Shipping Method -->
        <div class="checkout-section" id="section2">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>2. Shipping Method</h3>
            <span class="chevron">&#8964;</span>
          </div>
          <div class="section-body collapsed">
            <div class="shipping-options">
              <label class="shipping-option">
                <div class="shipping-option-left">
                  <input type="radio" name="shipping" value="standard" checked>
                  <div>
                    <p class="shipping-option-name">Standard Delivery</p>
                    <p class="shipping-option-sub">3–5 business days</p>
                  </div>
                </div>
                <span class="shipping-option-price">P50</span>
              </label>
              <label class="shipping-option">
                <div class="shipping-option-left">
                  <input type="radio" name="shipping" value="express">
                  <div>
                    <p class="shipping-option-name">Express Delivery</p>
                    <p class="shipping-option-sub">1–2 business days</p>
                  </div>
                </div>
                <span class="shipping-option-price">P120</span>
              </label>
              <label class="shipping-option">
                <div class="shipping-option-left">
                  <input type="radio" name="shipping" value="pickup">
                  <div>
                    <p class="shipping-option-name">Pick Up In Store</p>
                    <p class="shipping-option-sub">Gaborone, Botswana</p>
                  </div>
                </div>
                <span class="shipping-option-price">FREE</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Section 3: Payment -->
        <div class="checkout-section" id="section3">
          <div class="section-header" onclick="toggleSection(this)">
            <h3>3. Payment Method</h3>
            <span class="chevron">&#8964;</span>
          </div>
          <div class="section-body collapsed">
            <div class="payment-methods">
              <label class="payment-method">
                <input type="radio" name="payment" value="card" checked>
                <span>💳 Credit / Debit Card</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="payment" value="eft">
                <span>🏦 EFT / Bank Transfer</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="payment" value="orange">
                <span>📱 Orange Money</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="payment" value="mascom">
                <span>📱 Mascom MyZaka</span>
              </label>
            </div>
          </div>
        </div>

      </div>

      <!-- ─── RIGHT: ORDER SUMMARY ─── -->
      <div class="order-summary" id="orderSummary">
        <h3>Order Summary</h3>
        <div id="summaryItems">
          <!-- Rendered by JS -->
        </div>
        <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">P0</span></div>
        <div class="summary-row"><span>Shipping</span><span>P50</span></div>
        <hr class="summary-divider">
        <div class="summary-total"><span>Total</span><span id="summaryTotal">P0</span></div>
        <button class="btn btn-primary btn-full" id="placeOrderBtn">Place Order</button>
      </div>

    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    function toggleSection(header) {
      const body = header.nextElementSibling;
      const isOpen = !body.classList.contains('collapsed');
      if (isOpen) {
        body.classList.add('collapsed');
        header.classList.remove('open');
      } else {
        body.classList.remove('collapsed');
        header.classList.add('open');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const shipping = 50;

      // Render order items
      const itemsEl = document.getElementById('summaryItems');
      if (Cart.items.length === 0) {
        itemsEl.innerHTML = '<p style="font-size:13px;color:var(--mid-gray);margin-bottom:16px">No items in cart</p>';
      } else {
        itemsEl.innerHTML = Cart.items.map(item => `
          <div class="order-item">
            <div class="order-item-img ${item.color === 'White' ? 'light-bg' : ''}">696</div>
            <div>
              <p class="order-item-name">${item.name}</p>
              <p class="order-item-meta">Size: ${item.size} · Color: ${item.color} · Qty: ${item.qty}</p>
            </div>
            <span class="order-item-price">P${item.price * item.qty}</span>
          </div>
        `).join('');
      }

      document.getElementById('summarySubtotal').textContent = `P${Cart.total}`;
      document.getElementById('summaryTotal').textContent = `P${Cart.total + shipping}`;

      // Place order
      document.getElementById('placeOrderBtn').addEventListener('click', () => {
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        if (!name || !email) {
          showToast('Please fill in your shipping details');
          return;
        }
        // Save confirmation info
        localStorage.setItem('696dept_order_email', email);
        localStorage.setItem('696dept_order_number', '#' + Math.floor(69600000 + Math.random() * 99999));
        // Clear cart
        Cart.items = [];
        Cart.save();
        window.location.href = 'confirmation.html';
      });
    });
  </script>
</body>
</html>
