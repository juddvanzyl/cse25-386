<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — 696 DEPT</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .confirmation-page {
      padding: 80px 0 120px;
      text-align: center;
    }

    .check-circle {
      width: 80px;
      height: 80px;
      border: 2.5px solid var(--black);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .check-circle svg {
      width: 36px;
      height: 36px;
    }

    .confirm-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 56px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .confirm-sub {
      font-size: 15px;
      color: var(--dark-gray);
      margin-bottom: 28px;
    }

    .order-number {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .confirm-email {
      font-size: 14px;
      color: var(--mid-gray);
      margin-bottom: 48px;
    }

    .confirm-email span {
      color: var(--black);
      font-weight: 600;
    }

    @keyframes checkDraw {
      from { stroke-dashoffset: 60; }
      to { stroke-dashoffset: 0; }
    }

    .check-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: checkDraw 0.6s ease 0.3s forwards;
    }

    @keyframes circleGrow {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .check-circle {
      animation: circleGrow 0.4s ease forwards;
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="container confirmation-page">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path class="check-path" d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1 class="confirm-title">Thank You!</h1>
    <p class="confirm-sub">Your order has been placed successfully.</p>
    <p class="order-number" id="orderNum">Order Number: #69612345</p>
    <p class="confirm-email">
      A confirmation email has been sent to<br>
      <span id="orderEmail">youremail@example.com</span>
    </p>

    <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
  </div>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const num = localStorage.getItem('696dept_order_number') || '#69612345';
      const email = localStorage.getItem('696dept_order_email') || 'youremail@example.com';
      document.getElementById('orderNum').textContent = `Order Number: ${num}`;
      document.getElementById('orderEmail').textContent = email;
    });
  </script>
</body>
</html>
