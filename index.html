<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>696 DEPT — Streetwear That Speaks</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Custom -->
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── HERO ── matches HF_1 exactly */
    .hero {
      position: relative;
      min-height: 500px;
      background: #e8e8e8;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .hero-photo {
      position: absolute;
      right: 0; top: 0;
      width: 55%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    /* Gradient fade left side */
    .hero-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #e8e8e8 40%, rgba(232,232,232,0.6) 60%, transparent 75%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 80px 0;
    }
    .hero-tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(60px, 8vw, 90px);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #0a0a0a;
      margin-bottom: 18px;
    }
    .hero-tagline span { display: block; }
    .hero-sub {
      font-size: 15px;
      color: #444;
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* ── FEATURED ── */
    .sec-featured { padding: 64px 0 56px; }
    .sec-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 36px;
      color: #0a0a0a;
    }
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    /* ── tee placeholder SVG card ── */
    .tee-card-img {
      aspect-ratio: 1/1;
      background: #f5f5f5;
      overflow: hidden;
      margin-bottom: 10px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tee-card-img svg { width: 100%; height: 100%; }

    @media (max-width: 900px) {
      .featured-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 540px) {
      .featured-grid { grid-template-columns: 1fr; }
      .hero { min-height: 360px; }
    }
  </style>
</head>
<body>

  <div id="nav-ph"></div>

  <!-- ═══════════════════════════════════════
       HERO — SIMPLE. BOLD. CULTURE.
  ══════════════════════════════════════════ -->
  <section class="hero">
    <!-- Right side dark photo — use real image when available -->
    <div style="position:absolute;right:0;top:0;width:55%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <!-- Placeholder for hero photo. Replace src below with real image -->
      <svg width="100%" height="100%" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0">
        <rect width="600" height="500" fill="#1a1a1a"/>
        <!-- Person silhouette suggestion -->
        <ellipse cx="300" cy="180" rx="55" ry="60" fill="#2a2a2a"/>
        <rect x="240" y="240" width="120" height="160" rx="8" fill="#2a2a2a"/>
        <!-- 696 on back -->
        <text x="300" y="320" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="70" fill="rgba(255,255,255,0.18)">696</text>
        <text x="300" y="345" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="600" font-size="16" fill="rgba(255,255,255,0.12)" letter-spacing="4">DEPT.</text>
      </svg>
    </div>
    <div class="hero-fade"></div>
    <div class="container-696 hero-content">
      <h1 class="hero-tagline">
        <span>Simple.</span>
        <span>Bold.</span>
        <span>Culture.</span>
      </h1>
      <p class="hero-sub">Streetwear that speaks.</p>
      <a href="shop.html" class="btn-696 btn-black">Shop Now</a>
    </div>
  </section>

  <!-- ═══════════════════════════════════════
       FEATURED T-SHIRTS
  ══════════════════════════════════════════ -->
  <section class="sec-featured">
    <div class="container-696">
      <p class="sec-label">Featured T-Shirts</p>
      <div class="featured-grid">

        <!-- Card 1 — Black -->
        <a href="product.html?id=1" class="prod-card">
          <div class="tee-card-img">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="220" fill="#f5f5f5"/>
              <path d="M60 28 L20 63 L45 73 L45 183 L155 183 L155 73 L180 63 L140 28 Q100 8 60 28Z" fill="#111" stroke="#222" stroke-width="1"/>
              <text x="100" y="128" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="52" fill="rgba(255,255,255,0.85)">696</text>
              <text x="100" y="150" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.7)" letter-spacing="4">DEPT.</text>
            </svg>
          </div>
          <p class="prod-card-name">Bold 696 Tee</p>
          <p class="prod-card-price">P299</p>
        </a>

        <!-- Card 2 — White -->
        <a href="product.html?id=2" class="prod-card">
          <div class="tee-card-img">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="220" fill="#f5f5f5"/>
              <path d="M60 28 L20 63 L45 73 L45 183 L155 183 L155 73 L180 63 L140 28 Q100 8 60 28Z" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
              <text x="100" y="128" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="52" fill="rgba(0,0,0,0.75)">696</text>
              <text x="100" y="150" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="600" font-size="13" fill="rgba(0,0,0,0.55)" letter-spacing="4">DEPT.</text>
            </svg>
          </div>
          <p class="prod-card-name">Classic 696 Tee</p>
          <p class="prod-card-price">P299</p>
        </a>

        <!-- Card 3 — Black graphic -->
        <a href="product.html?id=3" class="prod-card">
          <div class="tee-card-img">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="220" fill="#f5f5f5"/>
              <path d="M60 28 L20 63 L45 73 L45 183 L155 183 L155 73 L180 63 L140 28 Q100 8 60 28Z" fill="#111" stroke="#222" stroke-width="1"/>
              <circle cx="100" cy="128" r="32" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
              <text x="100" y="132" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="22" fill="rgba(255,255,255,0.85)">696</text>
              <text x="100" y="147" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" letter-spacing="2">DEPT.</text>
            </svg>
          </div>
          <p class="prod-card-name">Global Tee</p>
          <p class="prod-card-price">P299</p>
        </a>

        <!-- Card 4 — White globe -->
        <a href="product.html?id=4" class="prod-card">
          <div class="tee-card-img">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="220" fill="#f5f5f5"/>
              <path d="M60 28 L20 63 L45 73 L45 183 L155 183 L155 73 L180 63 L140 28 Q100 8 60 28Z" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
              <circle cx="100" cy="128" r="30" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="1.5"/>
              <text x="100" y="132" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-weight="900" font-size="20" fill="rgba(0,0,0,0.7)">696</text>
              <text x="100" y="147" text-anchor="middle" font-family="'Barlow Condensed',sans-serif" font-size="9" fill="rgba(0,0,0,0.5)" letter-spacing="2">DEPT.</text>
            </svg>
          </div>
          <p class="prod-card-name">Splatter 696 Tee</p>
          <p class="prod-card-price">P299</p>
        </a>

      </div>
    </div>
  </section>

  <div id="footer-ph"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
