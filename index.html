<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>696 DEPT</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ✅ CORRECT FONT -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* RESET */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
}

/* NAVBAR */
.navbar {
  background: #efefef;
  padding: 15px 40px;
  position: relative;
}

.navbar-brand {
  border: 2px solid #000;
  padding: 6px 12px;
  font-weight: 700;
}

.nav-link {
  color: #000 !important;
  font-weight: 500;
}

/* ICONS */
.nav-icons {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
}

.icon-btn svg {
  transition: 0.2s;
}

.icon-btn:hover svg {
  opacity: 0.6;
}

/* HERO */
.hero {
  position: relative;
  height: 90vh;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* IMAGE */
.hero-img {
  position: absolute;
  right: 0;
  top: 0;
  width: 55%;
  height: 100%;
  object-fit: cover;
}

/* FADE */
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    #e8e8e8 45%,
    rgba(232,232,232,0.6) 65%,
    transparent 80%
  );
}

/* CONTENT */
.hero-content {
  position: relative;
  z-index: 2;
  max-width: 500px; /* 🔥 FIX */
}

/* 🔥 EXACT H1 STYLE */
.hero-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(75px, 8vw, 115px);
  line-height: 0.85;
  letter-spacing: -2px;
  max-width: 420px;
  margin-bottom: 20px;
}

/* SUBTEXT */
.hero-sub {
  font-size: 16px;
  color: #444;
  margin-bottom: 25px;
}

/* BUTTON */
.hero-btn {
  padding: 12px 28px;
  font-weight: 600;
}

/* FEATURED */
.section {
  padding: 60px 0;
}

.section-title {
  text-align: center;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 40px;
}

/* PRODUCTS */
.product-card img {
  width: 100%;
  background: #f5f5f5;
}

.product-name {
  margin-top: 10px;
}

.product-price {
  font-weight: 600;
}

/* FOOTER */
footer {
  background: #000;
  color: #fff;
  padding: 30px;
}

footer a {
  color: #fff;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 992px) {
  .hero-img {
    width: 100%;
    opacity: 0.3;
  }

  .hero-overlay {
    background: rgba(232,232,232,0.9);
  }

  .hero {
    height: auto;
    padding: 80px 0;
  }

  .nav-icons {
    position: static;
    transform: none;
    margin-top: 10px;
  }
}

@media (max-width: 576px) {
  .hero-title {
    font-size: 52px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">

    <a class="navbar-brand" href="index.html">696 DEPT</a>

      ☰
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="nav">
      <ul class="navbar-nav gap-4">
        <li><a class="nav-link" href="index.html">HOME</a></li>
        <li><a class="nav-link" href="shop.html">SHOP</a></li>
        <li><a class="nav-link" href="about.html">ABOUT</a></li>
        <li><a class="nav-link" href="#">LOOKBOOK</a></li>
        <li><a class="nav-link" href="contact.html">CONTACT</a></li>
      </ul>
    </div>

    <!-- ICONS -->
    <div class="nav-icons d-flex gap-3">

      <!-- SEARCH -->
      <a href="#" class="icon-btn">
        <svg width="22" height="22" fill="none" stroke="black" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </a>

      <!-- CART -->
      <a href="cart.html" class="icon-btn">

          <circle cx="9" cy="20" r="1.5"></circle>
          <circle cx="18" cy="20" r="1.5"></circle>

    </div>

  </div>
</nav>

<!-- HERO -->

<!-- FOOTER -->
<footer>
  <div class="container d-flex justify-content-between flex-wrap">

    <div class="d-flex gap-4">
      <a href="index.html">HOME</a>

    <div>© 2026</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
