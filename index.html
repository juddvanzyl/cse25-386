
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>696 Dept</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">696 Dept</div>

<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
<a class="navbar-brand fw-bold" href="#">696 Dept</a>

<div>
<button class="btn btn-sm btn-outline-light me-2" onclick="toggleMode()">🌙</button>
<button class="btn btn-sm btn-outline-light" onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<video autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="overlay text-center">
<h1 class="fw-bold">696 Dept</h1>
<p class="lead">Built for those who move different</p>
<a href="#products" class="btn btn-light px-4 mt-3">Shop Now</a>
</div>
</section>

<!-- PRODUCTS -->
<section id="products" class="container py-5 text-center">
<h2 class="mb-4 fw-bold">Latest Drops</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card product-card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="card-body">
<h5>Black Essential Tee</h5>
<p>P150</p>
<button onclick="addToCart('Black Tee',150)" class="btn btn-dark w-100">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card product-card">
<img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb">
<div class="card-body">
<h5>White Minimal Tee</h5>
<p>P180</p>
<button onclick="addToCart('White Tee',180)" class="btn btn-dark w-100">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card product-card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<div class="card-body">
<h5>Oversized Street Tee</h5>
<p>P200</p>
<button onclick="addToCart('Oversized Tee',200)" class="btn btn-dark w-100">Add to Cart</button>
</div>
</div>
</div>

</div>
</section>

<!-- CART -->
<div id="cart">
<h4>Your Cart</h4>
<ul id="cart-items"></ul>
<p class="fw-bold">Total: P<span id="total">0</span></p>
<button class="btn btn-dark w-100 mt-2">Checkout</button>
</div>

<!-- FOOTER -->
<footer class="text-center">
<p>© 2026 696 Dept | Streetwear Brand</p>
</footer>

<script src="script.js"></script>
</body>
</html>
