<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>696 DEPT</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
}

/* NAVBAR */
.navbar {
  background: #efefef;
  padding: 15px 40px;
  position: relative;
}

.navbar-brand {
  border: 2px solid #000;
  padding: 6px 12px;
  font-weight: 700;
}

.nav-link {
  color: #000 !important;
  font-weight: 500;
}

/* ICONS */
.nav-icons {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 15px;
}

.icon-btn svg {
  transition: 0.2s;
}

.icon-btn:hover svg {
  opacity: 0.6;
}

/* HERO */
.hero {
  position: relative;
  height: 520px;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.hero-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: right center;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(232,232,232,1) 0%,
    rgba(232,232,232,0.95) 25%,
    rgba(232,232,232,0.8) 40%,
    rgba(232,232,232,0.4) 55%,
    rgba(232,232,232,0.1) 65%,
    transparent 75%
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 500px;
  margin-left: 60px;
}

.hero-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(70px, 7vw, 110px);
  line-height: 0.85;
  letter-spacing: -2px;
  color: #1c1f22;
}

.hero-sub {
  margin-top: 20px;
  color: #444;
}

.hero-btn {
  margin-top: 20px;
  padding: 12px 28px;
}

.section {
  padding: 60px 0;
}

.section-title {
  text-align: center;
  font-weight: 700;
  margin-bottom: 40px;
}

.product-card img {
  width: 100%;
  background: #f5f5f5;
}

.product-name {
  margin-top: 10px;
}

.product-price {
  font-weight: 600;
}

footer {
  background: #000;
  color: #fff;
  padding: 30px;
}

footer a {
  color: #fff;
  text-decoration: none;
}

@media (max-width: 992px) {
  .hero {
    height: auto;
    padding: 80px 0;
  }

  .hero-img {
    opacity: 0.3;
  }

  .hero-overlay {
    background: rgba(232,232,232,0.9);
  }

  .nav-icons {
    position: static;
    transform: none;
    margin-top: 10px;
  }
}

@media (max-width: 576px) {
  .hero-title {
    font-size: 52px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">696 DEPT</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      ☰
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="nav">
      <ul class="navbar-nav gap-4">
        <li><a class="nav-link" href="index.html">HOME</a></li>
        <li><a class="nav-link" href="shop.html">SHOP</a></li>
        <li><a class="nav-link" href="about.html">ABOUT</a></li>
        <li><a class="nav-link" href="lookbook.html">LOOKBOOK</a></li>
        <li><a class="nav-link" href="contact.html">CONTACT</a></li>
      </ul>
    </div>

    <div class="nav-icons">
      <a href="#" class="icon-btn">
        <svg width="22" height="22" fill="none" stroke="black" stroke-width="2">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16" y1="16" x2="21" y2="21"/>
        </svg>
      </a>

      <a href="#" class="icon-btn">
        <svg width="22" height="22" fill="none" stroke="black" stroke-width="2">
          <path d="M6 6h15l-1.5 9h-13z"/>
          <circle cx="9" cy="20" r="1.5"/>
          <circle cx="18" cy="20" r="1.5"/>
        </svg>
      </a>
    </div>

  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <img src="images/hero.jpg" class="hero-img" alt="Model">

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1 class="hero-title">
      SIMPLE.<br>
      BOLD.<br>
      CULTURE.
    </h1>

    <p class="hero-sub">Streetwear that speaks.</p>

    <a href="#" class="btn btn-dark hero-btn">SHOP NOW</a>
  </div>
</section>

<!-- FEATURED -->
<section class="section">
  <div class="container">

    <h5 class="section-title">FEATURED T-SHIRTS</h5>

    <div class="row">

      <div class="col-md-3 col-6">
        <div class="product-card">
          <img src="images/p1.jpg" alt="696 Tee Black">
          <p class="product-name">696 Tee Black</p>
          <p class="product-price">P299</p>
        </div>
      </div>

      <div class="col-md-3 col-6">
        <div class="product-card">
          <img src="images/p2.jpg" alt="696 Tee White">
          <p class="product-name">696 Tee White</p>
          <p class="product-price">P299</p>
        </div>
      </div>

      <div class="col-md-3 col-6">
        <div class="product-card">
          <img src="images/p3.jpg" alt="Graphic Tee">
          <p class="product-name">Graphic Tee</p>
          <p class="product-price">P299</p>
        </div>
      </div>

      <div class="col-md-3 col-6">
        <div class="product-card">
          <img src="images/p4.jpg" alt="Globe Tee">
          <p class="product-name">Globe Tee</p>
          <p class="product-price">P299</p>
        </div>
      </div>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="container d-flex justify-content-between flex-wrap">
    <div>696 DEPT</div>

    <div class="d-flex gap-4">
      <a href="#">HOME</a>
      <a href="#">SHOP</a>
      <a href="#">ABOUT</a>
      <a href="#">LOOKBOOK</a>
      <a href="#">CONTACT</a>
    </div>

    <div>© 2026</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
